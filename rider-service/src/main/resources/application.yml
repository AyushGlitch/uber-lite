server:
  port: 8081

spring:
  application:
    name: rider-service
  datasource:
    url: jdbc:postgresql://localhost:5432/rider_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true